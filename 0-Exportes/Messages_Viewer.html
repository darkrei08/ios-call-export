<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Messages Exporter</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "surface-container": "var(--surface-container)",
                "surface-container-high": "var(--surface-container-high)",
              }
            }
          }
        }
    </script>
    <style>

        :root {
            --surface: #ffffff;
            --on-surface: #111827;
            --on-surface-variant: #4b5563;
            --surface-container: #f3f4f6;
            --surface-container-high: #e5e7eb;
            --primary: #007AFF;
            --primary-container: #dbeafe;
            --on-primary-container: #1e3a8a;
            --secondary: #16a34a;
            --error: #dc2626;
            --outline-variant: #d1d5db;
            --surface-dim: #f9fafb;
        }
        html.dark {
            --surface: #121317;
            --on-surface: #e3e2e7;
            --on-surface-variant: #c1c6d7;
            --surface-container: #1e1f23;
            --surface-container-high: #292a2e;
            --primary: #adc6ff;
            --primary-container: #4b8eff;
            --on-primary-container: #00285c;
            --secondary: #53e16f;
            --error: #ffb4ab;
            --outline-variant: #414755;
            --surface-dim: #121317;
        }

        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(24px); border-right: 1px solid rgba(0, 0, 0, 0.05); }
        html.dark .glass-panel { background: rgba(28, 28, 30, 0.4); border-right: 1px solid rgba(255, 255, 255, 0.1); }
        
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        html.dark .glass-header { background: rgba(28, 28, 30, 0.7); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        .glass-input { background: #f3f4f6; border: 1px solid rgba(0, 0, 0, 0.1); color: #000000; }
        html.dark .glass-input { background: #000000; border: 1px solid rgba(255, 255, 255, 0.1); color: #e3e2e7; }
        
        .glass-input:focus { border-color: #007AFF; outline: none; }
        
        .chat-item-hover:hover { background: rgba(0, 0, 0, 0.05); }
        html.dark .chat-item-hover:hover { background: rgba(255, 255, 255, 0.05); }
        
        .chat-item-active { background: #007AFF !important; color: #ffffff !important; }
        .chat-item-active .text-on-surface-variant { color: rgba(255,255,255,0.8) !important; }
        
        .bubble-sent { background-color: #007AFF; color: #ffffff; border-bottom-right-radius: 4px; }
        
        .bubble-received { background-color: #f1f1f1; color: #000000; border-bottom-left-radius: 4px; }
        html.dark .bubble-received { background-color: #2C2C2E; color: #e3e2e7; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
        html.dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.3); }
        html.dark ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        @media print {
            .sidebar-area, .toolbar-btns { display: none !important; }
            .chat-area { width: 100% !important; margin: 0; }
            .glass-header { position: static; }
            body, .chat-area { overflow: visible !important; height: auto !important; }
            .bubble-sent { background-color: #e0e0e0 !important; color: #000 !important; border: 1px solid #ccc; }
            .bubble-received { background-color: #f5f5f5 !important; color: #000 !important; border: 1px solid #ccc; }
            #chatHistory { display: block !important; overflow: visible !important; }
        }
    </style>
</head>
<body class="h-screen w-full flex bg-[#f8f9fa] text-black dark:bg-black dark:text-gray-200 transition-colors duration-300">

    <div class="sidebar-area w-[380px] flex flex-col glass-panel shrink-0 h-full">
        <div class="p-6 pb-4">
            <div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold text-black dark:text-white" data-i18n="messagesTitle">Messaggi</h1><div class="flex gap-1"><button id="themeToggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-colors"><span class="material-symbols-outlined dark:hidden text-black">dark_mode</span><span class="material-symbols-outlined hidden dark:block text-white">light_mode</span></button><button id="langToggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-colors font-bold text-sm text-black dark:text-white">EN</button></div></div>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">search</span>
                <input type="text" id="searchInput" placeholder="Cerca contatti o numeri..." data-i18n-placeholder="searchPlaceholder" class="glass-input w-full pl-10 pr-4 py-2.5 rounded-xl text-sm transition-all">
            </div>
        </div>
        <div class="flex-1 overflow-y-auto px-3 pb-6" id="chatList">
            <!-- Populated by JS -->
        </div>
    </div>

    <div class="chat-area flex-1 flex flex-col relative bg-white dark:bg-[#121214] h-full transition-colors duration-300" id="mainArea">
        <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-gray-500">
            <span class="material-symbols-outlined text-6xl mb-4 opacity-50" style="font-variation-settings: 'FILL' 0;">forum</span>
            <h2 class="text-xl font-medium text-black dark:text-gray-300 mb-2" data-i18n="selectConvTitle">Seleziona una conversazione</h2>
            <p class="text-sm text-gray-600 dark:text-gray-400" data-i18n="selectConvDesc">Scegli una chat dalla barra laterale per leggere i messaggi.</p>
        </div>
        
        <div id="chatContainer" class="hidden flex-1 flex flex-col h-full">
            <div class="glass-header px-6 py-4 flex items-center justify-between z-10 w-full shrink-0">
                <div class="flex items-center gap-4">
                    <div id="headerAvatar" class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center font-bold text-lg text-white">U</div>
                    <div>
                        <h2 id="headerTitle" class="text-lg font-semibold text-black dark:text-white">Contact Name</h2>
                        <p id="headerSubtitle" class="text-sm text-gray-600 dark:text-gray-400">+39 333 1234567</p>
                    </div>
                </div>
                <div class="toolbar-btns flex gap-3">
                    <button onclick="exportCSV()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-surface-container hover:bg-surface-container-high transition-colors text-sm font-medium border border-white/10 text-white">
                        <span class="material-symbols-outlined text-sm">download</span> CSV
                    </button>
                    <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-[#007AFF] hover:bg-[#0056b3] transition-colors text-sm font-medium text-white shadow-lg shadow-blue-500/20">
                        <span class="material-symbols-outlined text-sm">print</span> <span data-i18n="printBtn">Stampa</span>
                    </button>
                </div>
            </div>
            
            <div id="chatHistory" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

        const I18N = {
            it: {
                messagesTitle: "Messaggi",
                searchPlaceholder: "Cerca contatti o numeri...",
                selectConvTitle: "Seleziona una conversazione",
                selectConvDesc: "Scegli una chat dalla barra laterale per leggere i messaggi.",
                printBtn: "Stampa",

            },
            en: {
                messagesTitle: "Messages",
                searchPlaceholder: "Search contacts or numbers...",
                selectConvTitle: "Select a conversation",
                selectConvDesc: "Choose a chat from the sidebar to read the messages.",
                printBtn: "Print",
                noMsgTitle: "No messages found",
                noMsgDesc: "The backup contains no messages or they are encrypted.",
                you: "You",
                unknownId: "Unknown ID",
                noText: "[No text / Attachment]"
            }
        };
        let currentLang = "it";

        function updateI18n() {
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                if (I18N[currentLang][key]) {
                    el.innerText = I18N[currentLang][key];
                }
            });
            document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
                const key = el.getAttribute("data-i18n-placeholder");
                if (I18N[currentLang][key]) {
                    el.setAttribute("placeholder", I18N[currentLang][key]);
                }
            });
            document.getElementById("langToggle").innerText = currentLang.toUpperCase() === "EN" ? "IT" : "EN";
        }

        
        
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('themeToggle').addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
            document.getElementById('langToggle').addEventListener('click', () => {
                currentLang = currentLang === 'it' ? 'en' : 'it';
                updateI18n();
                renderChatList(document.getElementById('searchInput').value);
                if (currentChatId) {
                    selectChat(currentChatId); // refresh chat window language
                }
            });
            updateI18n();
        });

        let currentChatId = null;

        function renderChatList(filter = '') {
            const listEl = document.getElementById('chatList');
            listEl.innerHTML = '';
            
            let chats = [];
            if (typeof CHAT_DATA === 'object' && CHAT_DATA !== null) {
                chats = Object.values(CHAT_DATA);
            }

            chats = chats.filter(chat => {
                const name = (chat.contact_name || chat.handle_id || '').toLowerCase();
                return name.includes(filter.toLowerCase());
            });

            chats.sort((a, b) => {
                const lastA = a.messages && a.messages.length > 0 ? a.messages[a.messages.length - 1].timestamp : 0;
                const lastB = b.messages && b.messages.length > 0 ? b.messages[b.messages.length - 1].timestamp : 0;
                return lastB - lastA; 
            });

            chats.forEach(chat => {
                const div = document.createElement('div');
                const isActive = currentChatId === chat.handle_id;
                div.className = `p-3 mb-1 rounded-xl cursor-pointer transition-all ${isActive ? 'chat-item-active' : 'chat-item-hover'}`;
                div.onclick = () => selectChat(chat.handle_id);

                const lastMsg = chat.messages && chat.messages.length > 0 ? chat.messages[chat.messages.length - 1] : null;
                
                let dateStr = '';
                if (lastMsg && lastMsg.timestamp) {
                    const d = new Date(lastMsg.timestamp * 1000);
                    const now = new Date();
                    if (d.toDateString() === now.toDateString()) {
                        dateStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    } else {
                        dateStr = d.toLocaleDateString([], { day: '2-digit', month: '2-digit', year: '2-digit' });
                    }
                }
                
                const preview = lastMsg ? (lastMsg.is_from_me ? I18N[currentLang].you + ': ' : '') + (lastMsg.text || I18N[currentLang].noText) : '';
                let title = chat.contact_name || chat.handle_id;
                if (title && title.startsWith('="')) title = title.replace(/^="(.*)"$/, '$1');
                const initials = title.substring(0, 2).toUpperCase();

                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-full shrink-0 flex items-center justify-center font-bold text-sm bg-surface-container text-white border border-white/5 shadow-inner">
                            ${initials}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-baseline mb-0.5">
                                <h3 class="font-semibold text-base truncate pr-2 text-black dark:text-white">${title}</h3>
                                <span class="text-xs text-on-surface-variant shrink-0">${dateStr}</span>
                            </div>
                            <p class="text-sm text-on-surface-variant truncate">${escapeHtml(preview)}</p>
                        </div>
                    </div>
                `;
                listEl.appendChild(div);
            });
        }

        function selectChat(handleId) {
            currentChatId = handleId;
            renderChatList(document.getElementById('searchInput').value);
            
            const chat = CHAT_DATA[handleId];
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('chatContainer').classList.remove('hidden');
            
            let title = chat.contact_name || chat.handle_id;
                if (title && title.startsWith('="')) title = title.replace(/^="(.*)"$/, '$1');
            document.getElementById('headerTitle').textContent = title;
            let subtitle = chat.contact_name ? chat.handle_id : I18N[currentLang].unknownId;
            if (subtitle && subtitle.startsWith('="')) subtitle = subtitle.replace(/^="(.*)"$/, '$1');
            document.getElementById('headerSubtitle').textContent = subtitle;
            document.getElementById('headerAvatar').textContent = title.substring(0, 2).toUpperCase();

            const historyEl = document.getElementById('chatHistory');
            historyEl.innerHTML = '';

            let lastDateStr = '';

            (chat.messages || []).forEach(msg => {
                // Date separator logic
                const dateObj = new Date(msg.timestamp * 1000);
                const currDateStr = dateObj.toLocaleDateString([], { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                if (currDateStr !== lastDateStr) {
                    const sep = document.createElement('div');
                    sep.className = 'w-full flex justify-center my-4';
                    sep.innerHTML = `<span class="px-3 py-1 bg-surface-container rounded-full text-xs font-medium text-gray-400 border border-white/5">${currDateStr}</span>`;
                    historyEl.appendChild(sep);
                    lastDateStr = currDateStr;
                }

                const wrapper = document.createElement('div');
                const isMe = msg.is_from_me;
                wrapper.className = `flex flex-col w-full max-w-[75%] ${isMe ? 'self-end items-end' : 'self-start items-start'} mb-1`;
                
                const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const bubbleClass = isMe ? 'bubble-sent' : 'bubble-received';
                const text = escapeHtml(msg.text || I18N[currentLang].noText).replace(/\n/g, '<br>');

                wrapper.innerHTML = `
                    <div class="px-4 py-2.5 rounded-[20px] text-[15px] leading-[1.4] break-words shadow-sm ${bubbleClass} max-w-full">
                        ${text}
                    </div>
                    <div class="text-[11px] text-gray-500 mt-1 px-1 flex items-center gap-1">
                        ${timeStr}
                        ${msg.service ? `<span class="opacity-50">· ${msg.service}</span>` : ''}
                    </div>
                `;
                historyEl.appendChild(wrapper);
            });

            // Scroll to bottom
            setTimeout(() => {
                historyEl.scrollTop = historyEl.scrollHeight;
            }, 10);
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function exportCSV() {
            if (!currentChatId) return;
            const chat = CHAT_DATA[currentChatId];
            
            let csvContent = "data:text/csv;charset=utf-8,Data,Mittente,Testo\n";
            
            (chat.messages || []).forEach(msg => {
                const dateStr = new Date(msg.timestamp * 1000).toISOString().replace('T', ' ').substring(0, 19);
                const sender = msg.is_from_me ? I18N[currentLang].you : (chat.contact_name || chat.handle_id);
                const text = (msg.text || "").replace(/"/g, '""');
                csvContent += `"${dateStr}","${sender}","${text}"\n`;
            });
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `chat_${chat.contact_name || chat.handle_id}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderChatList(e.target.value);
        });

        // Initial render
        if (typeof CHAT_DATA === 'object' && Object.keys(CHAT_DATA).length > 0) {
            renderChatList();
        } else {
            document.getElementById('emptyState').innerHTML = `
                <span class="material-symbols-outlined text-6xl mb-4 opacity-50" style="font-variation-settings: 'FILL' 0;">warning</span>
                <h2 class="text-xl font-medium text-black dark:text-gray-300 mb-2" data-i18n="noMsgTitle">Nessun messaggio trovato</h2>
                <p class="text-sm text-gray-600 dark:text-gray-500" data-i18n="noMsgDesc">Il backup non contiene messaggi o sono crittografati.</p>
            `;
        }
    </script>
</body>
</html>
